<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flood Simulation - City</title>

<style>
  body { margin: 0; overflow: hidden; font-family: Arial; }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 10;
  }

  button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="ui">
  <h2>🌊 Flood in City</h2>
  <button onclick="startFlood()">Start Flood</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 12, 18);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// Ground (city land)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Water (starts outside city)
const water = new THREE.Mesh(
  new THREE.BoxGeometry(30, 1, 10),
  new THREE.MeshStandardMaterial({ color: 0x1e90ff, transparent: true, opacity: 0.7 })
);
water.position.set(0, 0.5, -15);
scene.add(water);

// Buildings (city)
const buildings = [];
for (let i = 0; i < 20; i++) {
  const h = Math.random() * 5 + 2;
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, h, 1.5),
    new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
  );

  b.position.set(
    (Math.random() - 0.5) * 20,
    h / 2,
    (Math.random() - 0.5) * 10
  );

  scene.add(b);
  buildings.push(b);
}

let flooding = false;

function startFlood() {
  flooding = true;
}

function animate() {
  requestAnimationFrame(animate);

  if (flooding) {
    // Water moves into city
    water.position.z += 0.05;
    water.scale.y += 0.002; // water rising

    // Buildings get submerged
    buildings.forEach(b => {
      if (water.position.z > b.position.z) {
        b.position.y -= 0.02; // sinking effect
      }
    });
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
