<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fire Simulation - Human Crowd Disaster</title>

<style>
  body { margin: 0; overflow: hidden; font-family: Arial; }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 10;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
  }

  button {
    padding: 10px;
    cursor: pointer;
  }

  #status { margin-top: 10px; }
</style>
</head>

<body>

<div id="ui">
  <h2>🔥 House Fire Simulation</h2>
  <button onclick="startFire()">Start Fire</button>
  <div id="status">Status: Safe</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // ☀️ DAY SKY

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 10, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(10, 20, 10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

// ================= GROUND =================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0x3cb371 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ================= HOUSE =================
const house = new THREE.Mesh(
  new THREE.BoxGeometry(4, 3, 4),
  new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
);
house.position.y = 1.5;
scene.add(house);

// Roof
const roof = new THREE.Mesh(
  new THREE.ConeGeometry(3, 2, 4),
  new THREE.MeshStandardMaterial({ color: 0x8b0000 })
);
roof.position.y = 4;
scene.add(roof);

// ================= FIRE (PARTICLES) =================
const fireCount = 300;
const fireGeometry = new THREE.BufferGeometry();
const firePositions = [];

for (let i = 0; i < fireCount; i++) {
  firePositions.push(
    (Math.random() - 0.5) * 1.5,
    Math.random() * 2,
    (Math.random() - 0.5) * 1.5
  );
}

fireGeometry.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(firePositions, 3)
);

const fireMaterial = new THREE.PointsMaterial({
  color: 0xff4500,
  size: 0.15,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending
});

const fire = new THREE.Points(fireGeometry, fireMaterial);
fire.position.set(0, 2, 0);
scene.add(fire);

// ================= HUMAN MODEL =================
function createHuman(x, z) {

  const group = new THREE.Group();

  // head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 12, 12),
    new THREE.MeshStandardMaterial({ color: 0xffcc99 })
  );
  head.position.y = 1.6;

  // body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.8, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x0077ff })
  );
  body.position.y = 1.0;

  // legs
  const leg1 = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 0.8, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  leg1.position.set(-0.15, 0.4, 0);

  const leg2 = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 0.8, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  leg2.position.set(0.15, 0.4, 0);

  group.add(head);
  group.add(body);
  group.add(leg1);
  group.add(leg2);

  group.position.set(x, 0, z);

  return group;
}

// ================= PEOPLE =================
const people = [];

for (let i = 0; i < 15; i++) {

  const human = createHuman(
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 20
  );

  human.userData = {
    vx: (Math.random() - 0.5) * 0.02,
    vz: (Math.random() - 0.5) * 0.02,
    panic: false
  };

  scene.add(human);
  people.push(human);
}

// ================= STATE =================
let fireActive = false;

// ================= START FIRE =================
function startFire() {
  fireActive = true;
  document.getElementById("status").innerText = "Status: FIRE! Evacuate Immediately!";
}

// ================= ANIMATION =================
function animate() {
  requestAnimationFrame(animate);

  if (fireActive) {

    // 🔥 FIRE ANIMATION
    const positions = fire.geometry.attributes.position.array;

    for (let i = 0; i < positions.length; i += 3) {

      positions[i + 1] += 0.03;
      positions[i] += (Math.random() - 0.5) * 0.05;
      positions[i + 2] += (Math.random() - 0.5) * 0.05;

      if (positions[i + 1] > 4) {
        positions[i + 1] = 0;
      }
    }

    fire.geometry.attributes.position.needsUpdate = true;

    // 🏠 HOUSE BURNS
    house.material.color.set(0x666666);
    roof.material.color.set(0x550000);

    light.intensity = 1.2 + Math.random() * 0.8;

    // 🧍 CROWD PANIC SYSTEM
    people.forEach(p => {

      const dist = p.position.distanceTo(fire.position);

      if (dist < 6) {
        p.userData.panic = true;
      }

      if (p.userData.panic) {

        const dx = p.position.x - fire.position.x;
        const dz = p.position.z - fire.position.z;

        p.position.x += dx * 0.01 + (Math.random() * 0.02);
        p.position.z += dz * 0.01 + (Math.random() * 0.02);

      } else {
        p.position.x += p.userData.vx;
        p.position.z += p.userData.vz;
      }

      // boundary control
      if (p.position.x > 20 || p.position.x < -20) p.userData.vx *= -1;
      if (p.position.z > 20 || p.position.z < -20) p.userData.vz *= -1;
    });
  }

  renderer.render(scene, camera);
}

animate();

// ================= RESIZE =================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
